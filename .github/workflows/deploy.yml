name: CI/CD to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate backend syntax
        run: python -m compileall backend

      - name: Confirm frontend assets exist
        run: test -f frontend/index.html && test -f frontend/index.css

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SSH key file
        run: |
          mkdir -p "$RUNNER_TEMP/ssh"
          cat > "$RUNNER_TEMP/ssh/ec2_key.pem" <<'EOF'
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 "$RUNNER_TEMP/ssh/ec2_key.pem"

      - name: Copy project files to EC2
        run: |
          mkdir -p /home/${{ secrets.EC2_USER }}/fashionbulk
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i "$RUNNER_TEMP/ssh/ec2_key.pem" -r backend frontend scripts ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/fashionbulk/

      - name: Run deployment on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i "$RUNNER_TEMP/ssh/ec2_key.pem" ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            cd /home/${{ secrets.EC2_USER }}/fashionbulk
            chmod +x scripts/deploy-ec2.sh
            ./scripts/deploy-ec2.sh
          '
